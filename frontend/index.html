<!DOCTYPE html>
<html>
<head>
  <title>3 Tier App</title>
</head>
<body>
  <h1>3-Tier App 🚀</h1>
  <button onclick="getData()">Get Data</button>
  <p id="output"></p>

  <script>
    async function getData() {
      const res = await fetch("http://localhost:5000/data");
      const data = await res.text();
      document.getElementById("output").innerText = data;
    }
  </script>
</body>
</html>
